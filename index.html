<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Martin Family Tree</title>
<style>
  :root{
    --bg:#F9F6F2; --ink:#4F4039; --muted:#8D8376; --accent:#5C4F45; --line:#EDE6DC;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,'Times New Roman',serif;
    text-align:center;padding:24px;
  }
  .card{max-width:420px}
  h1{font-size:26px;font-weight:600;letter-spacing:.2px;margin-bottom:10px}
  p{color:var(--muted);font-size:15px;font-style:italic;margin-bottom:26px}
  .links{display:flex;flex-direction:column;gap:12px;align-items:center}
  a.btn{
    display:block;width:240px;padding:13px 18px;border-radius:24px;text-decoration:none;
    font-size:15px;border:1px solid var(--line);color:var(--ink);background:#fff;
    box-shadow:0 2px 8px rgba(80,60,50,.08);
  }
  a.btn.primary{background:var(--accent);border-color:var(--accent);color:#FAF8F6}
  .spin{width:26px;height:26px;margin:0 auto 18px;border-radius:50%;
    border:2.5px solid var(--line);border-top-color:var(--accent);animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="card">
    <div class="spin" aria-hidden="true"></div>
    <h1>The Martin Family Tree</h1>
    <p class="autotxt">Choosing the best version for your device&hellip;</p>
    <noscript><style>.spin,.autotxt{display:none}</style><p>Choose your version:</p></noscript>
    <div class="links">
      <a class="btn primary" href="mobile.html">Mobile version</a>
      <a class="btn" href="tree.html">Desktop tree</a>
    </div>
  </div>
<script>
(function(){
  // ?view=mobile|desktop sets a sticky override (used by the in-app "switch" links)
  var q=null;
  try{ q=new URLSearchParams(location.search).get('view'); }catch(e){}
  if(q!=='mobile'&&q!=='desktop') q=null;
  if(q){ try{ localStorage.setItem('ft-view',q); }catch(e){} }
  var choice=q;
  if(!choice){ try{ choice=localStorage.getItem('ft-view'); }catch(e){} }
  if(choice!=='mobile'&&choice!=='desktop'){
    // Phones -> mobile. Tablets and desktops (incl. iPad desktop-mode Safari) -> desktop tree.
    var ua=navigator.userAgent||'';
    var phoneUA=/iPhone|iPod|Windows Phone|Mobi/i.test(ua)&&!/iPad/i.test(ua);
    var coarse=false;
    try{ coarse=matchMedia('(pointer: coarse)').matches; }catch(e){}
    var smallScreen=Math.min(screen.width,screen.height)<=600;
    choice=(phoneUA||(coarse&&smallScreen))?'mobile':'desktop';
  }
  location.replace(choice==='mobile'?'mobile.html':'tree.html');
})();
</script>
</body>
</html>
